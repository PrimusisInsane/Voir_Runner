<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VOID RUNNER</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Void Runner">
<meta name="theme-color" content="#0a0a0f">
<style>
  :root{
    --void:#0a0a0f;
    --floor:#121218;
    --blood:#e6394f;
    --toxic:#7cfc6a;
    --arc:#a78bfa;
    --ink:#c9c9d6;
    --dim:#5a5a68;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
  html,body{
    width:100%;height:100%;overflow:hidden;
    background:var(--void);
    font-family:'Courier New',monospace;
    touch-action:none;
    overscroll-behavior:none;
  }
  #wrap{position:fixed;inset:0;}
  canvas{display:block;width:100%;height:100%;background:var(--floor);}

  #hud{
    position:fixed;top:0;left:0;right:0;
    padding:14px 16px 0 16px;
    display:flex;flex-direction:column;gap:6px;
    pointer-events:none;
    z-index:10;
  }
  .row{display:flex;align-items:center;gap:10px;}
  #hpOuter{
    flex:1; height:14px; background:#1a1a22; border:1px solid #2a2a34;
    position:relative; overflow:hidden;
  }
  #hpInner{
    position:absolute;top:0;left:0;bottom:0;width:100%;
    background:linear-gradient(90deg,#7a1224,var(--blood));
    transition:width .15s ease;
  }
  #xpOuter{
    height:6px; background:#1a1a22; border:1px solid #2a2a34; overflow:hidden;
  }
  #xpInner{
    height:100%;width:0%;background:var(--arc);transition:width .2s ease;
  }
  #lvlTag{
    font-weight:bold;font-size:12px;color:var(--arc);letter-spacing:2px;min-width:50px;
  }
  #topRight{
    display:flex;justify-content:space-between;font-size:11px;color:var(--dim);letter-spacing:1px;
  }
  #threat{color:var(--blood);font-weight:bold;}
  #timer{color:var(--ink);}

  #joyZone{
    position:fixed; left:0; bottom:0; width:45%; height:45%;
    z-index:15;
  }
  #joyBase{
    position:fixed; width:110px;height:110px;border-radius:50%;
    border:2px solid rgba(167,139,250,.35); background:rgba(167,139,250,.05);
    display:none; z-index:16; pointer-events:none;
  }
  #joyStick{
    position:fixed; width:46px;height:46px;border-radius:50%;
    background:rgba(167,139,250,.6); border:1px solid var(--arc);
    display:none; z-index:17; pointer-events:none;
  }

  #startScreen,#overScreen,#levelUpScreen{
    position:fixed;inset:0;z-index:30;
    background:rgba(8,8,12,.94);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:18px; text-align:center; padding:24px;
  }
  #overScreen{display:none;}
  #levelUpScreen{display:none;}
  .title{
    font-size:38px;font-weight:900;letter-spacing:4px;color:var(--ink);
    text-transform:uppercase;
  }
  .title span{color:var(--blood);}
  .sub{color:var(--dim);font-size:12px;letter-spacing:2px;max-width:280px;line-height:1.6;}
  .btn{
    margin-top:10px;padding:14px 34px;background:transparent;
    border:2px solid var(--toxic); color:var(--toxic);
    font-family:'Courier New',monospace; font-weight:bold; letter-spacing:3px;
    font-size:14px; cursor:pointer; text-transform:uppercase;
  }
  .btn:active{background:var(--toxic);color:#0a0a0f;}
  #statLine{color:var(--dim);font-size:12px;letter-spacing:1px;margin-top:6px;}
  #statLine b{color:var(--ink);}

  #cards{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;max-width:420px;}
  .card{
    width:120px;padding:16px 10px;border:2px solid var(--arc);
    background:rgba(167,139,250,.06);cursor:pointer;
  }
  .card:active{background:rgba(167,139,250,.25);}
  .card .ic{font-size:26px;margin-bottom:8px;}
  .card .nm{font-size:11px;font-weight:bold;color:var(--ink);letter-spacing:1px;}
  .card .ds{font-size:10px;color:var(--dim);margin-top:6px;line-height:1.4;}

  #flashMsg{
    position:fixed;top:46%;left:50%;transform:translate(-50%,-50%);
    font-size:20px;font-weight:900;letter-spacing:3px;color:var(--blood);
    z-index:25;pointer-events:none;opacity:0;text-transform:uppercase;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>

  <div id="hud">
    <div class="row">
      <div id="lvlTag">LV 1</div>
      <div id="hpOuter"><div id="hpInner"></div></div>
    </div>
    <div id="xpOuter"><div id="xpInner"></div></div>
    <div id="topRight">
      <div id="threat">THREAT 1</div>
      <div id="timer">00:00</div>
    </div>
  </div>

  <div id="joyZone"></div>
  <div id="joyBase"></div>
  <div id="joyStick"></div>

  <div id="flashMsg"></div>

  <div id="startScreen">
    <div class="title">VOID<br><span>RUNNER</span></div>
    <div class="sub">DRAG ANYWHERE TO MOVE. YOUR CORE AUTO-FIRES AT THE NEAREST THREAT. SURVIVE. THE VOID GETS HUNGRIER OVER TIME.</div>
    <button class="btn" id="startBtn">ENTER THE VOID</button>
  </div>

  <div id="overScreen">
    <div class="title" style="font-size:28px;">YOU FELL</div>
    <div id="statLine"></div>
    <button class="btn" id="retryBtn">RUN AGAIN</button>
  </div>

  <div id="levelUpScreen">
    <div class="title" style="font-size:22px;color:var(--arc);">POWER SURGE</div>
    <div class="sub">CHOOSE ONE</div>
    <div id="cards"></div>
  </div>
</div>

<script>
(function(){
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  let W,H,DPR;
  function resize(){
    DPR = Math.min(window.devicePixelRatio||1, 2);
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W*DPR; canvas.height = H*DPR;
    canvas.style.width=W+'px'; canvas.style.height=H+'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  // ---------- state ----------
  let running=false, paused=false;
  let t=0, lastTime=0, elapsed=0;
  let player, enemies, orbs, projectiles, particles;
  let killCount=0, threatLevel=1;
  let joyActive=false, joyVec={x:0,y:0}, joyOrigin={x:0,y:0};

  const hpInner=document.getElementById('hpInner');
  const xpInner=document.getElementById('xpInner');
  const lvlTag=document.getElementById('lvlTag');
  const threatEl=document.getElementById('threat');
  const timerEl=document.getElementById('timer');
  const flashMsg=document.getElementById('flashMsg');
  const startScreen=document.getElementById('startScreen');
  const overScreen=document.getElementById('overScreen');
  const levelUpScreen=document.getElementById('levelUpScreen');
  const statLine=document.getElementById('statLine');
  const cardsDiv=document.getElementById('cards');

  function flash(text,color){
    flashMsg.textContent=text;
    flashMsg.style.color=color||'#e6394f';
    flashMsg.style.transition='none';
    flashMsg.style.opacity='1';
    flashMsg.style.transform='translate(-50%,-50%) scale(1.15)';
    requestAnimationFrame(()=>{
      flashMsg.style.transition='opacity .9s ease, transform .9s ease';
      flashMsg.style.opacity='0';
      flashMsg.style.transform='translate(-50%,-60%) scale(1)';
    });
  }

  function shade(hex,percent){
    let r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
    r=Math.max(0,Math.min(255,Math.round(r+(percent/100)*255)));
    g=Math.max(0,Math.min(255,Math.round(g+(percent/100)*255)));
    b=Math.max(0,Math.min(255,Math.round(b+(percent/100)*255)));
    return `rgb(${r},${g},${b})`;
  }
  // draws a small top-down human: legs trail behind, torso + head lead in facing direction
  function drawHuman(x,y,angle,scale,bodyColor,legPhase,glow){
    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(angle);
    const legSwing = Math.sin(legPhase)*scale*0.4;
    // legs (trail behind, along local -x)
    ctx.fillStyle=shade(bodyColor,-35);
    ctx.beginPath();
    ctx.ellipse(-scale*0.45, legSwing, scale*0.2, scale*0.42, 0, 0, 7);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(-scale*0.45, -legSwing, scale*0.2, scale*0.42, 0, 0, 7);
    ctx.fill();
    // torso (diamond-ish, points forward along local +x)
    if(glow){ ctx.shadowColor=bodyColor; ctx.shadowBlur=glow; }
    ctx.fillStyle=bodyColor;
    ctx.beginPath();
    ctx.moveTo(scale*0.75,0);
    ctx.lineTo(scale*0.05, scale*0.55);
    ctx.lineTo(-scale*0.35, scale*0.32);
    ctx.lineTo(-scale*0.35,-scale*0.32);
    ctx.lineTo(scale*0.05,-scale*0.55);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur=0;
    // head
    ctx.fillStyle=shade(bodyColor,45);
    ctx.beginPath();
    ctx.arc(scale*0.62,0,scale*0.28,0,7);
    ctx.fill();
    ctx.restore();
  }

  function initGame(){
    player = {
      x: W/2, y: H/2, r: 14,
      hp: 100, maxHp: 100,
      speed: 190,
      level: 1, xp: 0, xpNeed: 12,
      dmg: 10, atkSpeed: 1.6, // shots per second
      atkCd: 0,
      range: 260,
      magnet: 90,
      multishot: 1,
      regen: 0,
      angle:0,
      legPhase:0
    };
    enemies=[]; orbs=[]; projectiles=[]; particles=[];
    killCount=0; threatLevel=1; elapsed=0; t=0;
    spawnTimer=0;
  }

  // ---------- input: virtual joystick (drag anywhere) ----------
  const joyBase=document.getElementById('joyBase');
  const joyStick=document.getElementById('joyStick');
  let activeTouchId=null;

  function startJoy(x,y,id){
    joyActive=true; activeTouchId=id;
    joyOrigin={x,y};
    joyBase.style.display='block';
    joyStick.style.display='block';
    joyBase.style.left=(x-55)+'px'; joyBase.style.top=(y-55)+'px';
    joyStick.style.left=(x-23)+'px'; joyStick.style.top=(y-23)+'px';
  }
  function moveJoy(x,y){
    let dx=x-joyOrigin.x, dy=y-joyOrigin.y;
    const max=55;
    const dist=Math.hypot(dx,dy);
    if(dist>max){ dx=dx/dist*max; dy=dy/dist*max; }
    joyStick.style.left=(joyOrigin.x+dx-23)+'px';
    joyStick.style.top=(joyOrigin.y+dy-23)+'px';
    joyVec.x=dx/max; joyVec.y=dy/max;
  }
  function endJoy(){
    joyActive=false; activeTouchId=null;
    joyBase.style.display='none';
    joyStick.style.display='none';
    joyVec.x=0; joyVec.y=0;
  }

  canvas.addEventListener('touchstart',e=>{
    if(!running||paused)return;
    const touch=e.changedTouches[0];
    if(!joyActive) startJoy(touch.clientX, touch.clientY, touch.identifier);
    e.preventDefault();
  },{passive:false});
  canvas.addEventListener('touchmove',e=>{
    for(const touch of e.changedTouches){
      if(touch.identifier===activeTouchId) moveJoy(touch.clientX, touch.clientY);
    }
    e.preventDefault();
  },{passive:false});
  canvas.addEventListener('touchend',e=>{
    for(const touch of e.changedTouches){
      if(touch.identifier===activeTouchId) endJoy();
    }
  },{passive:false});

  // mouse fallback for desktop testing
  let mouseDown=false;
  canvas.addEventListener('mousedown',e=>{
    if(!running||paused)return;
    mouseDown=true; startJoy(e.clientX,e.clientY,'mouse');
  });
  window.addEventListener('mousemove',e=>{
    if(mouseDown) moveJoy(e.clientX,e.clientY);
  });
  window.addEventListener('mouseup',()=>{
    if(mouseDown){mouseDown=false; endJoy();}
  });

  // ---------- spawning ----------
  let spawnTimer=0;
  function spawnEnemy(){
    const edge=Math.floor(Math.random()*4);
    let x,y;
    if(edge===0){x=-30;y=Math.random()*H;}
    else if(edge===1){x=W+30;y=Math.random()*H;}
    else if(edge===2){x=Math.random()*W;y=-30;}
    else {x=Math.random()*W;y=H+30;}

    const scale = 1 + (elapsed/25); // grows over time
    const isBig = Math.random() < Math.min(0.06+elapsed/300, 0.28);
    const isFast = !isBig && Math.random()<0.22;

    let e = {
      x,y,
      r: isBig? 24 : 11,
      hp: (isBig? 60 : 14) * scale,
      maxHp: 0,
      speed: (isFast? 130 : 68) * (1+Math.min(elapsed/400,0.6)),
      dmg: (isBig? 18: 8) * (1+Math.min(elapsed/500,0.8)),
      color: isBig? '#e6394f' : (isFast? '#ffb020' : '#c9536a'),
      xp: isBig? 8: (isFast?4:3),
      hitCd:0
    };
    e.maxHp=e.hp;
    enemies.push(e);
  }

  function spawnOrb(x,y,xp){
    orbs.push({x,y,r:5,xp,vx:0,vy:0});
  }

  // ---------- level up ----------
  const upgradePool=[
    {ic:'⚔',nm:'SHARPEN',ds:'+35% damage', apply:p=>p.dmg*=1.35},
    {ic:'⚡',nm:'HASTEN',ds:'+25% attack speed', apply:p=>p.atkSpeed*=1.25},
    {ic:'👟',nm:'SPRINT',ds:'+18% move speed', apply:p=>p.speed*=1.18},
    {ic:'❤',nm:'VITALITY',ds:'+30 max HP & heal', apply:p=>{p.maxHp+=30;p.hp=Math.min(p.maxHp,p.hp+30);}},
    {ic:'🧲',nm:'MAGNETIZE',ds:'+60% pickup radius', apply:p=>p.magnet*=1.6},
    {ic:'✳',nm:'MULTISHOT',ds:'+1 projectile', apply:p=>p.multishot+=1},
    {ic:'♻',nm:'REGEN',ds:'+1.2 hp/sec', apply:p=>p.regen+=1.2},
    {ic:'📡',nm:'REACH',ds:'+25% attack range', apply:p=>p.range*=1.25},
  ];
  function shuffle(arr){
    const a=arr.slice();
    for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
    return a;
  }
  function openLevelUp(){
    paused=true;
    levelUpScreen.style.display='flex';
    cardsDiv.innerHTML='';
    const picks=shuffle(upgradePool).slice(0,3);
    picks.forEach(u=>{
      const div=document.createElement('div');
      div.className='card';
      div.innerHTML=`<div class="ic">${u.ic}</div><div class="nm">${u.nm}</div><div class="ds">${u.ds}</div>`;
      div.addEventListener('click',()=>{
        u.apply(player);
        levelUpScreen.style.display='none';
        paused=false;
        flash('POWER UP','#a78bfa');
      });
      cardsDiv.appendChild(div);
    });
  }

  // ---------- game loop ----------
  function update(dt){
    t+=dt; elapsed+=dt;
    threatLevel = 1+Math.floor(elapsed/20);

    // move player
    const mag=Math.hypot(joyVec.x,joyVec.y);
    if(mag>0.12){
      player.x += joyVec.x*player.speed*dt;
      player.y += joyVec.y*player.speed*dt;
      player.angle = Math.atan2(joyVec.y,joyVec.x);
      player.legPhase += dt*10;
    }
    player.x=Math.max(player.r,Math.min(W-player.r,player.x));
    player.y=Math.max(player.r,Math.min(H-player.r,player.y));

    if(player.regen>0) player.hp=Math.min(player.maxHp, player.hp+player.regen*dt);

    // spawn logic: interval shrinks, count grows with threat
    const spawnInterval = Math.max(0.35, 1.1 - elapsed/80);
    spawnTimer -= dt;
    if(spawnTimer<=0){
      const batch = 1+Math.floor(threatLevel/4);
      for(let i=0;i<batch;i++) spawnEnemy();
      spawnTimer = spawnInterval;
    }

    // enemies move toward player
    for(const e of enemies){
      const dx=player.x-e.x, dy=player.y-e.y;
      const d=Math.hypot(dx,dy)||1;
      e.x += dx/d*e.speed*dt;
      e.y += dy/d*e.speed*dt;
      e.angle = Math.atan2(dy,dx);
      e.legPhase = (e.legPhase||0) + dt*(6+e.speed*0.03);
      e.hitCd -= dt;
      if(d < e.r+player.r && e.hitCd<=0){
        player.hp -= e.dmg;
        e.hitCd = 0.6;
        flash('-'+Math.round(e.dmg),'#e6394f');
      }
    }

    // player auto attack
    player.atkCd -= dt;
    if(player.atkCd<=0 && enemies.length>0){
      let targets = enemies
        .map(e=>({e,d:Math.hypot(e.x-player.x,e.y-player.y)}))
        .filter(o=>o.d<=player.range)
        .sort((a,b)=>a.d-b.d)
        .slice(0,player.multishot)
        .map(o=>o.e);
      if(targets.length>0){
        for(const target of targets){
          const dx=target.x-player.x, dy=target.y-player.y;
          const d=Math.hypot(dx,dy)||1;
          projectiles.push({
            x:player.x,y:player.y,
            vx:dx/d*420, vy:dy/d*420,
            dmg:player.dmg, r:4, life:1.2
          });
        }
        player.atkCd = 1/player.atkSpeed;
      }
    }

    // projectiles
    for(let i=projectiles.length-1;i>=0;i--){
      const p=projectiles[i];
      p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt;
      let hit=false;
      for(let j=enemies.length-1;j>=0;j--){
        const e=enemies[j];
        if(Math.hypot(p.x-e.x,p.y-e.y) < e.r+p.r){
          e.hp -= p.dmg;
          hit=true;
          for(let k=0;k<4;k++) particles.push({x:e.x,y:e.y,vx:(Math.random()-0.5)*140,vy:(Math.random()-0.5)*140,life:0.35,color:e.color});
          if(e.hp<=0){
            spawnOrb(e.x,e.y,e.xp);
            enemies.splice(j,1);
            killCount++;
          }
          break;
        }
      }
      if(hit || p.life<=0 || p.x<-40||p.x>W+40||p.y<-40||p.y>H+40) projectiles.splice(i,1);
    }

    // orbs
    for(let i=orbs.length-1;i>=0;i--){
      const o=orbs[i];
      const dx=player.x-o.x, dy=player.y-o.y;
      const d=Math.hypot(dx,dy);
      if(d<player.magnet){
        o.x += dx/d*260*dt;
        o.y += dy/d*260*dt;
      }
      if(d<player.r+o.r){
        player.xp += o.xp;
        orbs.splice(i,1);
        if(player.xp>=player.xpNeed){
          player.xp -= player.xpNeed;
          player.level++;
          player.xpNeed = Math.round(player.xpNeed*1.28+4);
          openLevelUp();
        }
      }
    }

    // particles
    for(let i=particles.length-1;i>=0;i--){
      const pt=particles[i];
      pt.x+=pt.vx*dt; pt.y+=pt.vy*dt; pt.life-=dt;
      if(pt.life<=0) particles.splice(i,1);
    }

    if(player.hp<=0) gameOver();

    // HUD
    hpInner.style.width=Math.max(0,(player.hp/player.maxHp*100))+'%';
    xpInner.style.width=(player.xp/player.xpNeed*100)+'%';
    lvlTag.textContent='LV '+player.level;
    threatEl.textContent='THREAT '+threatLevel;
    const mm=String(Math.floor(elapsed/60)).padStart(2,'0');
    const ss=String(Math.floor(elapsed%60)).padStart(2,'0');
    timerEl.textContent=mm+':'+ss;
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    // floor grid
    ctx.strokeStyle='rgba(167,139,250,0.05)';
    ctx.lineWidth=1;
    const gs=40;
    for(let x=0;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

    // danger vignette scales with threat
    const vig = Math.min(0.35, threatLevel*0.02);
    const grad = ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.3,W/2,H/2,Math.max(W,H)*0.7);
    grad.addColorStop(0,'rgba(230,57,79,0)');
    grad.addColorStop(1,`rgba(230,57,79,${vig})`);
    ctx.fillStyle=grad;
    ctx.fillRect(0,0,W,H);

    // orbs
    for(const o of orbs){
      ctx.beginPath();
      ctx.fillStyle='#7cfc6a';
      ctx.shadowColor='#7cfc6a'; ctx.shadowBlur=8;
      ctx.arc(o.x,o.y,o.r,0,7);
      ctx.fill();
      ctx.shadowBlur=0;
    }

    // particles
    for(const pt of particles){
      ctx.globalAlpha=Math.max(0,pt.life/0.35);
      ctx.fillStyle=pt.color;
      ctx.fillRect(pt.x-2,pt.y-2,4,4);
      ctx.globalAlpha=1;
    }

    // enemies
    for(const e of enemies){
      drawHuman(e.x,e.y,e.angle||0,e.r*1.7,e.color,e.legPhase||0,0);
      // hp bar
      if(e.hp<e.maxHp){
        ctx.fillStyle='#1a1a22';
        ctx.fillRect(e.x-e.r,e.y-e.r-8,e.r*2,3);
        ctx.fillStyle='#e6394f';
        ctx.fillRect(e.x-e.r,e.y-e.r-8,e.r*2*(e.hp/e.maxHp),3);
      }
    }

    // projectiles
    for(const p of projectiles){
      ctx.beginPath();
      ctx.fillStyle='#a78bfa';
      ctx.shadowColor='#a78bfa'; ctx.shadowBlur=6;
      ctx.arc(p.x,p.y,p.r,0,7);
      ctx.fill();
      ctx.shadowBlur=0;
    }

    // player
    drawHuman(player.x,player.y,player.angle,player.r*1.9,'#a78bfa',player.legPhase,14);

    // range ring (subtle)
    ctx.beginPath();
    ctx.strokeStyle='rgba(167,139,250,0.08)';
    ctx.arc(player.x,player.y,player.range,0,7);
    ctx.stroke();
  }

  function loop(now){
    if(!lastTime) lastTime=now;
    let dt=(now-lastTime)/1000;
    lastTime=now;
    dt=Math.min(dt,0.05);
    if(running && !paused){
      update(dt);
      draw();
    }
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  function gameOver(){
    running=false;
    statLine.innerHTML = `SURVIVED <b>${timerEl.textContent}</b> · LEVEL <b>${player.level}</b> · KILLS <b>${killCount}</b>`;
    overScreen.style.display='flex';
  }

  document.getElementById('startBtn').addEventListener('click',()=>{
    startScreen.style.display='none';
    initGame();
    lastTime=0;
    running=true; paused=false;
  });
  document.getElementById('retryBtn').addEventListener('click',()=>{
    overScreen.style.display='none';
    initGame();
    lastTime=0;
    running=true; paused=false;
  });
  if('serviceWorker' in navigator){
    window.addEventListener('load',()=>{
      navigator.serviceWorker.register('sw.js').catch(()=>{});
    });
  }
})();
</script>
</body>
</html>
